<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributed Task Engine</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --bg: #f5f5f3;
          --surface: #ffffff;
          --border: rgba(0,0,0,0.1);
          --border-mid: rgba(0,0,0,0.18);
          --text: #1a1a1a;
          --text-muted: #666;
          --text-faint: #999;
          --radius: 10px;
          --radius-sm: 6px;
          --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
          --mono: "SF Mono", "Fira Code", "Cascadia Code", monospace;
        }

        body {
          font-family: var(--font);
          background: var(--bg);
          color: var(--text);
          min-height: 100vh;
        }

        /* Header */
        header {
          background: var(--surface);
          border-bottom: 0.5px solid var(--border);
          padding: 0 2rem;
          height: 54px;
          display: flex;
          align-items: center;
          gap: 10px;
        }

        .logo-icon {
          width: 30px;
          height: 30px;
          background: #111;
          border-radius: 8px;
          display: flex;
          align-items: center;
          justify-content: center;
          flex-shrink: 0;
        }

        .logo-icon svg { width: 16px; height: 16px; }

        .logo-text {
          font-size: 14px;
          font-weight: 500;
          color: var(--text);
        }

        /* Main layout */
        .container {
          max-width: 960px;
          margin: 0 auto;
          padding: 2rem 1.5rem;
          display: flex;
          flex-direction: column;
          gap: 1.5rem;
        }

        /* Section label */
        .section-label {
          font-size: 11px;
          font-weight: 500;
          color: var(--text-faint);
          letter-spacing: .08em;
          text-transform: uppercase;
          margin-bottom: .65rem;
        }

        /* Card */
        .card {
          background: var(--surface);
          border: 0.5px solid var(--border);
          border-radius: var(--radius);
          padding: 1.25rem 1.5rem;
        }

        /* Form row */
        .form-row {
          display: flex;
          gap: 10px;
          align-items: flex-end;
          flex-wrap: wrap;
        }

        .form-group {
          display: flex;
          flex-direction: column;
          gap: 5px;
        }

        .form-group label {
          font-size: 12px;
          font-weight: 500;
          color: var(--text-muted);
        }

        select, input[type="text"] {
          font-family: var(--font);
          font-size: 13px;
          padding: 8px 12px;
          border: 0.5px solid var(--border-mid);
          border-radius: var(--radius-sm);
          background: var(--surface);
          color: var(--text);
          outline: none;
          transition: border-color .15s, box-shadow .15s;
          height: 36px;
        }

        select { min-width: 180px; cursor: pointer; }
        input[type="text"] { min-width: 220px; flex: 1; }

        select:focus, input[type="text"]:focus {
          border-color: #378ADD;
          box-shadow: 0 0 0 2px rgba(55,138,221,.12);
        }

        button {
          font-family: var(--font);
          font-size: 13px;
          font-weight: 500;
          padding: 0 18px;
          height: 36px;
          background: #111;
          color: #fff;
          border: none;
          border-radius: var(--radius-sm);
          cursor: pointer;
          transition: opacity .15s;
          white-space: nowrap;
          flex-shrink: 0;
        }

        button:hover { opacity: .82; }
        button:active { transform: scale(.98); }

        /* Stats row */
        .stats-row {
          display: grid;
          grid-template-columns: repeat(4, 1fr);
          gap: 10px;
        }

        .stat-card {
          background: var(--surface);
          border: 0.5px solid var(--border);
          border-radius: var(--radius);
          padding: .9rem 1.1rem;
        }

        .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
        .stat-val   { font-size: 24px; font-weight: 500; color: var(--text); }
        .stat-val.green  { color: #1D9E75; }
        .stat-val.orange { color: #BA7517; }
        .stat-val.red    { color: #A32D2D; }

        /* Table */
        .table-wrap {
          overflow-x: auto;
          border-radius: var(--radius);
          border: 0.5px solid var(--border);
          background: var(--surface);
        }

        table {
          width: 100%;
          border-collapse: collapse;
          font-size: 13px;
        }

        thead tr {
          border-bottom: 0.5px solid var(--border);
        }

        th {
          padding: 10px 16px;
          text-align: left;
          font-size: 11px;
          font-weight: 500;
          color: var(--text-faint);
          letter-spacing: .06em;
          text-transform: uppercase;
          background: #fafaf9;
        }

        td {
          padding: 11px 16px;
          border-bottom: 0.5px solid var(--border);
          color: var(--text);
          vertical-align: middle;
        }

        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: #fafaf9; }

        .task-id {
          font-family: var(--mono);
          font-size: 12px;
          color: var(--text-muted);
        }

        .type-badge {
          display: inline-block;
          font-size: 11px;
          font-weight: 500;
          padding: 2px 9px;
          border-radius: 20px;
          background: #f0efec;
          color: #444;
          letter-spacing: .02em;
        }

        /* Status pills — class names match original exactly */
        .status-pill {
          display: inline-flex;
          align-items: center;
          gap: 5px;
          font-size: 11px;
          font-weight: 500;
          padding: 3px 10px;
          border-radius: 20px;
        }

        .status-dot {
          width: 6px;
          height: 6px;
          border-radius: 50%;
          flex-shrink: 0;
        }

        .PENDING   { background: #FAEEDA; color: #BA7517; }
        .RETRYING  { background: #EEEDFE; color: #534AB7; }
        .COMPLETED { background: #EAF3DE; color: #3B6D11; }
        .FAILED    { background: #FCEBEB; color: #A32D2D; }

        .PENDING   .status-dot { background: #EF9F27; }
        .RETRYING  .status-dot { background: #534AB7; }
        .COMPLETED .status-dot { background: #1D9E75; }
        .FAILED    .status-dot { background: #E24B4A; }

        .retry-val {
          font-family: var(--mono);
          font-size: 12px;
          color: var(--text-muted);
        }

        .retry-bar-wrap {
          display: flex;
          align-items: center;
          gap: 8px;
        }

        .retry-bar {
          width: 48px;
          height: 4px;
          background: #eee;
          border-radius: 2px;
          overflow: hidden;
        }

        .retry-bar-fill {
          height: 100%;
          background: #EF9F27;
          border-radius: 2px;
          transition: width .3s ease;
        }

        /* Empty state */
        .empty-row td {
          text-align: center;
          padding: 2.5rem;
          color: var(--text-faint);
          font-size: 13px;
        }

        /* Workers */
        .workers-grid {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 12px;
        }

        .worker-card {
          background: var(--surface);
          border: 0.5px solid var(--border);
          border-radius: var(--radius);
          padding: 1rem 1.25rem;
        }

        .worker-header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-bottom: .5rem;
        }

        .worker-id { font-size: 13px; font-weight: 500; color: var(--text); }

        .w-badge {
          font-size: 11px;
          font-weight: 500;
          padding: 2px 9px;
          border-radius: 20px;
        }

        .w-busy  { background: #EAF3DE; color: #3B6D11; }
        .w-idle  { background: #f0efec; color: #5F5E5A; }
        .w-error { background: #FCEBEB; color: #A32D2D; }

        .worker-task {
          font-size: 12px;
          color: var(--text-muted);
          font-family: var(--mono);
          margin-bottom: .6rem;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .worker-progress {
          height: 4px;
          background: #eee;
          border-radius: 2px;
          overflow: hidden;
          margin-bottom: .5rem;
        }

        .worker-progress-fill {
          height: 100%;
          border-radius: 2px;
          transition: width .5s ease;
        }

        .wpf-green { background: #1D9E75; }
        .wpf-gray  { background: #ccc; }
        .wpf-amber { background: #EF9F27; }

        .worker-meta { font-size: 11px; color: var(--text-faint); }

        @media (max-width: 640px) {
          .stats-row { grid-template-columns: repeat(2,1fr); }
          .workers-grid { grid-template-columns: 1fr; }
          .form-row { flex-direction: column; }
          select, input[type="text"] { min-width: 100%; width: 100%; }
          button { width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-icon">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="5" height="5" rx="1" fill="white"/>
            <rect x="9" y="2" width="5" height="5" rx="1" fill="white" opacity=".6"/>
            <rect x="2" y="9" width="5" height="5" rx="1" fill="white" opacity=".6"/>
            <rect x="9" y="9" width="5" height="5" rx="1" fill="white" opacity=".3"/>
        </svg>
    </div>
    <span class="logo-text">Distributed Task Engine</span>
</header>

<div class="container">

    <!-- Stats -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">Total tasks</div>
            <div class="stat-val" id="stat-total">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Completed</div>
            <div class="stat-val green" id="stat-completed">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Pending / retrying</div>
            <div class="stat-val orange" id="stat-active">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Failed</div>
            <div class="stat-val red" id="stat-failed">0</div>
        </div>
    </div>

    <!-- Workers -->
    <div>
        <div class="section-label">Workers</div>
        <div class="workers-grid" id="workers-grid"></div>
    </div>

    <!-- Submit -->
    <div>
        <div class="section-label">Submit task</div>
        <div class="card">
            <div class="form-row">
                <div class="form-group">
                    <label>Type</label>
                    <select id="type">
                        <option value="PROCESS_DATA">Process Data</option>
                        <option value="GENERATE_REPORT">Generate Report</option>
                        <option value="LONG_TASK">Long Task</option>
                    </select>
                </div>
                <div class="form-group" style="flex:1">
                    <label>Data</label>
                    <input type="text" id="data" placeholder="Enter task data">
                </div>
                <button onclick="createTask()">Dispatch task →</button>
            </div>
        </div>
    </div>

    <!-- Table -->
    <div>
        <div class="section-label">Task history</div>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>Task ID</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>Retries</th>
                </tr>
                </thead>
                <tbody id="taskTable">
                <tr class="empty-row"><td colspan="4">No tasks yet — dispatch one to get started.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    let tasks = {};

    const WORKERS = [
      { id: "worker-1", status: "idle", task: "—", progress: 0, handled: 0 },
      { id: "worker-2", status: "idle", task: "—", progress: 0, handled: 0 },
      { id: "worker-3", status: "idle", task: "—", progress: 0, handled: 0 },
    ];
    let workerCursor = 0;

    function renderWorkers() {
      document.getElementById("workers-grid").innerHTML = WORKERS.map(w => `
        <div class="worker-card">
          <div class="worker-header">
            <span class="worker-id">${w.id}</span>
            <span class="w-badge ${w.status === 'busy' ? 'w-busy' : w.status === 'error' ? 'w-error' : 'w-idle'}">${w.status}</span>
          </div>
          <div class="worker-task">${w.task}</div>
          <div class="worker-progress">
            <div class="worker-progress-fill ${w.status === 'busy' ? 'wpf-green' : w.status === 'error' ? 'wpf-amber' : 'wpf-gray'}"
                 style="width:${w.progress}%"></div>
          </div>
          <div class="worker-meta">Tasks handled: ${w.handled}</div>
        </div>`).join("");
    }

    function assignWorker(taskData) {
      const w = WORKERS[workerCursor % 3];
      workerCursor++;
      w.status = "busy"; w.task = taskData; w.progress = 10; w.handled++;
      renderWorkers();
      return w.id;
    }

    function syncWorkerToTask(taskId) {
      const task = tasks[taskId];
      if (!task || !task._worker) return;
      const w = WORKERS.find(x => x.id === task._worker);
      if (!w) return;
      if (task.status === "COMPLETED") {
        w.progress = 100;
        setTimeout(() => { w.status = "idle"; w.task = "—"; w.progress = 0; renderWorkers(); }, 800);
      } else if (task.status === "FAILED") {
        w.status = "error"; w.progress = 30;
        setTimeout(() => { w.status = "idle"; w.task = "—"; w.progress = 0; renderWorkers(); }, 1200);
      } else if (task.status === "RETRYING") {
        w.progress = Math.min(85, w.progress + 15);
      }
      renderWorkers();
    }

    setInterval(() => {
      WORKERS.forEach(w => {
        if (w.status === "busy" && w.progress < 88) w.progress += Math.floor(Math.random() * 6);
      });
      renderWorkers();
    }, 1500);

    renderWorkers();

    function createTask() {
      const data = document.getElementById("data").value;
      const type = document.getElementById("type").value;
      if (!data) {
        alert("Enter task data");
        return;
      }
      fetch(`/task?type=${type}&data=${encodeURIComponent(data)}`, {
        method: "POST"
      })
      .then(res => res.json())
      .then(task => {
        const wid = assignWorker(data);
        tasks[task.id] = { ...task, type, _worker: wid };
        updateTable();
      })
      .catch(err => {
        console.error(err);
        alert("Error creating task");
      });
    }

    function updateTable() {
      const table = document.getElementById("taskTable");
      const entries = Object.values(tasks);

      if (!entries.length) {
        table.innerHTML = '<tr class="empty-row"><td colspan="4">No tasks yet — dispatch one to get started.</td></tr>';
        updateStats(entries);
        return;
      }

      table.innerHTML = entries.slice().reverse().map(task => {
        const retries = task.retryCount || 0;
        const pct = Math.min(100, (retries / 3) * 100);
        return `
          <tr>
            <td><span class="task-id">${task.id}</span></td>
            <td><span class="type-badge">${task.type}</span></td>
            <td><span class="status-pill ${task.status}"><span class="status-dot"></span>${task.status}</span></td>
            <td>
              <div class="retry-bar-wrap">
                <span class="retry-val">${retries}/3</span>
                <div class="retry-bar"><div class="retry-bar-fill" style="width:${pct}%"></div></div>
              </div>
            </td>
          </tr>`;
      }).join("");

      updateStats(entries);
    }

    function updateStats(entries) {
      document.getElementById("stat-total").textContent     = entries.length;
      document.getElementById("stat-completed").textContent = entries.filter(t => t.status === "COMPLETED").length;
      document.getElementById("stat-active").textContent    = entries.filter(t => t.status === "PENDING" || t.status === "RETRYING").length;
      document.getElementById("stat-failed").textContent    = entries.filter(t => t.status === "FAILED").length;
    }

    function pollStatus() {
      Object.keys(tasks).forEach(id => {
        fetch(`/task/${id}`)
        .then(res => res.json())
        .then(task => {
          tasks[id] = { ...tasks[id], ...task };
          syncWorkerToTask(id);
          updateTable();
        });
      });
    }

    setInterval(pollStatus, 2000);
</script>

</body>
</html>
